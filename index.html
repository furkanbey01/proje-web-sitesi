<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proje Web Sitesi</title>
    <!-- Import a clean, modern font reminiscent of Apple's minimal style -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Reset default margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Use Inter for a sleek, neutral typographic base */
            font-family: 'Inter', sans-serif;
            height: 100vh;
            /* Deep blue gradient for a sophisticated, modern backdrop */
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        /* Phone frame container */
        .phone {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 9 / 16;
            /* Border and radius for a refined frosted-glass card */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            /* Frosted glass background with slightly higher opacity for a pronounced effect */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            /* Softer shadow to enhance the floating appearance */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            animation: slideDown 1.2s ease-out forwards;
            opacity: 0;
        }

        .phone .welcome {
            font-size: 1.3rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1rem;
            color: #f5f5f5;
        }

        .phone #clock {
            font-size: 3rem;
            text-align: center;
            letter-spacing: 0.1em;
            margin: 1rem 0;
            /* Soft cool blue reminiscent of Apple’s accent colors */
            color: #82c8ff;
            text-shadow: 0 0 8px #82c8ff, 0 0 16px #82c8ff, 0 0 32px #3c76be;
        }

        .phone .info {
            font-size: 0.75rem;
            text-align: center;
            color: rgba(240, 240, 240, 0.9);
            margin-top: 1rem;
            line-height: 1.5;
        }

        /* Removed old #clock styles; now defined within .phone */

        /* Keyframes for slide-down animation */
        @keyframes slideDown {
            0% {
                transform: translateY(-30px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Phone-shaped container for mobile friendly design -->
    <div class="phone">
        <!-- Updated welcome message to a friendly English phrase conveying our mission -->
        <div class="welcome">We're working to make your life easier</div>
        <div id="clock">00:00:00</div>
        <div class="info">
            Üzerinde çalıştığımız "Yapay Zeka Destekli Gerçek Zamanlı Olay Analizi ve Akıllı Bildirim Yönetim Platformu" (AI‑Powered Event Analytics & Notification Platform).
        </div>
    </div>

    <script>
        function updateClock() {
            const clockElement = document.getElementById('clock');
            const now = new Date();
            // format hours, minutes, seconds with leading zeros
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockElement.textContent = `${hours}:${minutes}:${seconds}`;
        }
        // initial call to display time immediately
        updateClock();
        // update every second
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
