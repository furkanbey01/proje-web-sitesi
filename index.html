<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proje Web Sitesi</title>
    <!-- Google Fonts for a futuristic digital look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset default margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #0d0f21 0%, #1c1f3c 50%, #2f3468 100%);
            color: #f5f6fa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        /* Phone frame container */
        .phone {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9 / 16;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            background: linear-gradient(135deg, #1c1f3c 0%, #2f3468 100%);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            animation: fadeIn 1.5s ease-in-out forwards;
            opacity: 0;
        }

        .phone .welcome {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .phone #clock {
            font-size: 3rem;
            text-align: center;
            letter-spacing: 0.1em;
            margin: 1rem 0;
            color: #00e0ff;
            text-shadow: 0 0 10px #00e0ff, 0 0 20px #00e0ff, 0 0 30px #0066ff;
        }

        .phone .info {
            font-size: 0.75rem;
            text-align: center;
            color: #bbbbdd;
            margin-top: 1rem;
            line-height: 1.3;
        }

        /* Removed old #clock styles; now defined within .phone */

        /* Keyframes for fade-in animation */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Phone-shaped container for mobile friendly design -->
    <div class="phone">
        <div class="welcome">We are here to make your life easier.</div>
        <div id="clock">00:00:00</div>
        <div class="info">
            We are preparing an application that will make your life easier. Stay tuned!
        </div>
    </div>

    <script>
        function updateClock() {
            const clockElement = document.getElementById('clock');
            const now = new Date();
            // format hours, minutes, seconds with leading zeros
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockElement.textContent = `${hours}:${minutes}:${seconds}`;
        }
        // initial call to display time immediately
        updateClock();
        // update every second
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
