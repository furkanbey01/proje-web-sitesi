<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proje Web Sitesi</title>
    <!-- Google Fonts for a futuristic digital look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Reset default margin and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            /* Dark gradient reminiscent of modern glassy designs */
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f5f6fa;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        /* Phone frame container */
        .phone {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 9 / 16;
            /* Subtle border for glass effect */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            /* Frosted glass background */
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            /* Soft shadow to lift the card from background */
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
            animation: slideDown 1.5s ease-out forwards;
            opacity: 0;
        }

        .phone .welcome {
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 1rem;
            color: #ffffff;
        }

        .phone #clock {
            font-size: 3rem;
            text-align: center;
            letter-spacing: 0.1em;
            margin: 1rem 0;
            color: #80dfff; /* soft neon blue */
            text-shadow: 0 0 10px #80dfff, 0 0 20px #80dfff, 0 0 30px #4d8cff;
        }

        .phone .info {
            font-size: 0.75rem;
            text-align: center;
            color: #d6d6f0;
            margin-top: 1rem;
            line-height: 1.4;
        }

        /* Removed old #clock styles; now defined within .phone */

        /* Keyframes for slide-down animation */
        @keyframes slideDown {
            0% {
                transform: translateY(-30px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Phone-shaped container for mobile friendly design -->
    <div class="phone">
        <!-- Updated welcome message to a friendly English phrase conveying our mission -->
        <div class="welcome">We're working to make your life easier</div>
        <div id="clock">00:00:00</div>
        <div class="info">
            We are preparing an application that will make your life easier. Stay tuned!
        </div>
    </div>

    <script>
        function updateClock() {
            const clockElement = document.getElementById('clock');
            const now = new Date();
            // format hours, minutes, seconds with leading zeros
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockElement.textContent = `${hours}:${minutes}:${seconds}`;
        }
        // initial call to display time immediately
        updateClock();
        // update every second
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
